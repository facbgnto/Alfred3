services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: alfred
      POSTGRES_PASSWORD: alfred
      POSTGRES_DB: alfred
    ports: ["5432:5432"]
    volumes:
      - alfred_postgres:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alfred"]
      interval: 5s
      timeout: 3s
      retries: 10
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]
  api:
    build: ./apps/api
    env_file: .env
    ports: ["34777:34777"]
    depends_on:
      postgres: {condition: service_healthy}
    extra_hosts: ["host.docker.internal:host-gateway"]
  voice:
    build: ./apps/voice-service
    env_file: .env
    ports: ["8765:8765"]
    depends_on: [api]
    devices:
      - /dev/snd:/dev/snd
    environment:
      PYTHONUNBUFFERED: 1
  web:
    build: ./apps/web
    ports: ["5174:80"]
    depends_on: [api]
volumes:
  alfred_postgres:
  ollama_data:
